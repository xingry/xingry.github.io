# Jekyll 配置 for Chirpy 主题
# 文档：https://chirpy.cotes2020.page/docs/quick-start

# 站点设置
title: "老邢的博客"
tagline: "记录技术思考、生活感悟与学习笔记"
description: "老邢的技术博客，分享编程、AI 和生活感悟"
url: "https://xingry.github.io"
baseurl: ""

# 语言设置
lang: zh-CN

# 作者信息
author:
  github: xingry
  twitter: xingry
  email: ""

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
timezone: Asia/Shanghai

# 分页设置
paginate: 10
paginate_path: "/page/:num/"

# 集合配置
collections:
  tabs:
    output: true
    sort_by: order

# 默认值配置
defaults:
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Chirpy 主题配置
theme: jekyll-theme-chirpy

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .gitignore
  - README.md
